example_cases:
  - id: vehicle_routing
    title: 配送ルートを容量制約つきで決める
    narrative: 複数車両で顧客を回り、移動距離を短くしたい。
    signals: [ordering, capacity, binary, exact_gap]
    expected_top3: [network_flow_graph_optimization, combinatorial_optimization, mixed_integer_linear_programming, constraint_programming_sat_smt]
    likely_traps: [linear_programming]
  - id: workforce_shift
    title: 人員シフトを作る
    narrative: スキル、休暇、最低人数、連勤制約を守りながら割当を決める。
    signals: [assignment, logical, binary, feasibility]
    expected_top3: [constraint_programming_sat_smt, mixed_integer_linear_programming, combinatorial_optimization]
    likely_traps: [linear_programming]
  - id: production_planning
    title: 生産計画の数量配分
    narrative: 材料と設備容量の下で利益を最大化する。
    signals: [linear, resource, continuous]
    expected_top3: [linear_programming, mixed_integer_linear_programming, stochastic_programming]
    likely_traps: [bayesian_optimization_problem]
  - id: experiment_design
    title: 高価な実験条件を探索する
    narrative: 1回の実験に数時間かかり、反応値だけが得られる。
    signals: [blackbox, expensive, sequential]
    expected_top3: [bayesian_optimization_problem, blackbox_derivative_free, simulation_optimization]
    likely_traps: [linear_programming]
  - id: hyperparameter_tuning
    title: モデルのハイパーパラメータを調整する
    narrative: 学習率、木の深さ、特徴量処理を validation loss で選ぶ。
    signals: [blackbox, categorical, expensive, ml]
    expected_top3: [hpo_automl, bayesian_optimization_problem, blackbox_derivative_free]
    likely_traps: [differentiable_optimization]
  - id: uncertain_inventory
    title: 需要不確実な在庫計画
    narrative: 需要シナリオを使って欠品と在庫コストを調整する。
    signals: [scenarios, recourse, expectation]
    expected_top3: [stochastic_programming, robust_optimization, distributionally_robust_optimization]
    likely_traps: [linear_programming]
  - id: robot_control
    title: ロボットの軌道と入力を決める
    narrative: ダイナミクスと入力制限を守りながら目標姿勢へ動かす。
    signals: [dynamics, continuous_time, constraints]
    expected_top3: [optimal_control, nonlinear_programming, dynamic_programming_rl]
    likely_traps: [linear_programming]
  - id: ab_allocation
    title: A/B テスト配分を途中で更新する
    narrative: 結果を見ながら配分を変え、機会損失を抑えたい。
    signals: [online_feedback, regret, experiment]
    expected_top3: [online_optimization_bandits, bayesian_optimization_problem, dynamic_programming_rl]
    likely_traps: [stochastic_programming]
  - id: price_optimization
    title: 価格を需要曲線に合わせて決める
    narrative: 需要反応が非線形で、制約下で利益最大化したい。
    signals: [nonlinear, continuous, revenue]
    expected_top3: [nonlinear_programming, nonconvex_optimization, online_optimization_bandits]
    likely_traps: [linear_programming]
  - id: portfolio
    title: ポートフォリオのリスクと収益を調整する
    narrative: 期待収益と分散リスクの tradeoff を取りたい。
    signals: [quadratic, convex, risk]
    expected_top3: [multi_objective_optimization, quadratic_programming, convex_optimization, socp_sdp]
    likely_traps: [mixed_integer_linear_programming]
  - id: robust_supply_chain
    title: 供給途絶に備えたサプライチェーン設計
    narrative: 需要と供給の範囲を仮定し、悪いケースでも破綻しない設計にする。
    signals: [uncertainty_set, worst_case, network]
    expected_top3: [robust_optimization, mixed_integer_linear_programming, stochastic_programming]
    likely_traps: [bayesian_optimization_problem]
  - id: facility_location
    title: 施設配置を決める
    narrative: どの拠点を開き、顧客をどこへ割り当てるか決める。
    signals: [selection, assignment, fixed_cost]
    expected_top3: [mixed_integer_linear_programming, combinatorial_optimization, linear_programming]
    likely_traps: [nonlinear_programming]
  - id: shortest_path
    title: 最短経路を求める
    narrative: グラフ上で出発点から到着点までの最短経路を探す。
    signals: [graph, path, discrete]
    expected_top3: [network_flow_graph_optimization, combinatorial_optimization, linear_programming, dynamic_programming_rl]
    likely_traps: [bayesian_optimization_problem]
  - id: matching
    title: 参加者同士を条件つきでマッチングする
    narrative: 希望、制約、公平性を考慮して割当を作る。
    signals: [assignment, discrete, fairness]
    expected_top3: [combinatorial_optimization, mixed_integer_linear_programming, constraint_programming_sat_smt]
    likely_traps: [convex_optimization]
  - id: fair_resource_allocation
    title: 公平性制約つき資源配分
    narrative: 効率と公平性を両立しながら限られた資源を配る。
    signals: [multi_objective, constraints, fairness]
    expected_top3: [multi_objective_optimization, convex_optimization, linear_programming, mixed_integer_linear_programming]
    likely_traps: [hpo_automl]
  - id: not_optimization_reporting
    title: 売上低下の原因を説明したい
    narrative: まだ意思決定変数や目的関数がなく、まず分析が必要。
    signals: [no_decision_variable, diagnosis_first]
    expected_top3: [not_optimization, linear_programming, stochastic_programming]
    likely_traps: [bayesian_optimization_problem]
  - id: pde_design
    title: 形状を変えて物理シミュレーション結果を改善する
    narrative: PDE シミュレータは重く、勾配はまだ取れていない。
    signals: [simulator, expensive, derivative_free]
    expected_top3: [simulation_optimization, bayesian_optimization_problem, blackbox_derivative_free]
    likely_traps: [linear_programming]
  - id: model_training_loss
    title: ニューラルネットの学習損失を下げる
    narrative: 勾配計算できる大規模非凸最適化。
    signals: [gradient, nonconvex, large_scale]
    expected_top3: [nonconvex_optimization, nonlinear_programming, differentiable_optimization]
    likely_traps: [linear_programming]
  - id: maintenance_scheduling
    title: 設備メンテナンスの時期を決める
    narrative: 稼働停止を避けながら保全作業を割り当てる。
    signals: [scheduling, binary, resource]
    expected_top3: [mixed_integer_linear_programming, constraint_programming_sat_smt, combinatorial_optimization]
    likely_traps: [bayesian_optimization_problem]
  - id: ad_budget_online
    title: 広告予算を日次で配分し直す
    narrative: クリックやCVの観測を見ながら配分を変える。
    signals: [online_feedback, budget, regret]
    expected_top3: [online_optimization_bandits, stochastic_programming, linear_programming]
    likely_traps: [optimal_control]
  - id: config_validation
    title: 製品構成がルールを満たすか判定する
    narrative: オプションの依存・排他・必須条件を満たす組合せを探す。
    signals: [logical, feasibility, discrete]
    expected_top3: [constraint_programming_sat_smt, combinatorial_optimization, mixed_integer_linear_programming]
    likely_traps: [nonlinear_programming]
  - id: decision_focused_forecast
    title: 予測モデルを配分最適化の損失で学習する
    narrative: 予測誤差ではなく、予測後の意思決定損失を下げたい。
    signals: [decision_focused, differentiable, rich_data]
    expected_top3: [differentiable_optimization, convex_optimization, hpo_automl]
    likely_traps: [bayesian_optimization_problem]
  - id: tail_risk_portfolio
    title: 分布推定に不安があるポートフォリオを組む
    narrative: 履歴データはあるが外れ値と分布ずれに備えたい。
    signals: [ambiguity_set, tail_risk, portfolio]
    expected_top3: [distributionally_robust_optimization, robust_optimization, quadratic_programming]
    likely_traps: [linear_programming]
  - id: supply_chain_network
    title: 倉庫と配送ネットワークを再設計する
    narrative: 拠点候補、輸送容量、固定費を見ながら、どの倉庫を使いどの需要地へ送るかを決める。
    signals: [network, fixed_cost, capacity, assignment]
    expected_top3: [network_flow_graph_optimization, mixed_integer_linear_programming, combinatorial_optimization, linear_programming]
    likely_traps: [bayesian_optimization_problem]
  - id: stochastic_capacity_expansion
    title: 将来需要が不確かな設備投資を段階的に決める
    narrative: 需要シナリオごとに追加投資や不足ペナルティが変わるため、初期投資と後続対応を同時に考えたい。
    signals: [scenarios, recourse, investment, uncertainty]
    expected_top3: [stochastic_programming, robust_optimization, mixed_integer_linear_programming]
    likely_traps: [linear_programming]
  - id: robust_staffing_plan
    title: 欠勤リスクを見込んだ人員配置を作る
    narrative: 必要人数に幅があり、最悪側の需要でも現場が回るように配置余裕を決めたい。
    signals: [uncertainty_set, staffing, feasibility, worst_case]
    expected_top3: [robust_optimization, mixed_integer_linear_programming, stochastic_programming]
    likely_traps: [bayesian_optimization_problem]
  - id: expensive_ab_variant_search
    title: 少数の施策案から次に試すA/B案を選ぶ
    narrative: 各テストの実施コストが高く、過去結果の不確実性を使って次の検証案を順番に選びたい。
    signals: [experiment, expensive, sequential, uncertainty]
    expected_top3: [bayesian_optimization_problem, online_optimization_bandits, hpo_automl]
    likely_traps: [linear_programming]
  - id: not_optimization_forecast_first
    title: 来月の需要をまず予測したい
    narrative: まだ配分や発注量を決める段階ではなく、意思決定前に需要の説明変数と予測精度を確認したい。
    signals: [forecast_first, no_decision_variable, rich_data]
    expected_top3: [not_optimization, stochastic_programming, linear_programming]
    likely_traps: [bayesian_optimization_problem]
  - id: not_optimization_alignment
    title: 部門間で目的関数が合意できていない
    narrative: 売上、利益、顧客満足のどれを優先するかが決まっておらず、最適化モデルに入れる目的がまだ定義できない。
    signals: [objective_unclear, stakeholder_alignment, diagnosis_first]
    expected_top3: [not_optimization, convex_optimization, linear_programming]
    likely_traps: [mixed_integer_linear_programming]
  - id: multi_stage_pricing_policy
    title: 在庫と反応を見ながら価格を何度も更新する
    narrative: 価格を出すたびに需要反応が観測され、残在庫と時間を見ながら次の価格を決めたい。
    signals: [online_feedback, revenue, sequential, nonlinear]
    expected_top3: [online_optimization_bandits, nonlinear_programming, stochastic_programming]
    likely_traps: [linear_programming]
  - id: process_design_minlp
    title: 設備選択と運転条件を同時に決める
    narrative: どの装置を採用するかという離散判断と、温度・流量などの非線形運転条件を同時に最適化したい。
    signals: [integer, nonlinear, process, nonconvex]
    expected_top3: [mixed_integer_nonlinear_programming, nonconvex_optimization, mixed_integer_linear_programming, nonlinear_programming]
    likely_traps: [linear_programming]
  - id: nonlinear_facility_sizing
    title: 拠点サイズと非線形コストを同時に決める
    narrative: 候補拠点を選びつつ、規模の経済や混雑コストの非線形性を入れて容量を決めたい。
    signals: [selection, nonlinear, capacity, fixed_cost]
    expected_top3: [mixed_integer_nonlinear_programming, mixed_integer_linear_programming, nonlinear_programming]
    likely_traps: [linear_programming]
