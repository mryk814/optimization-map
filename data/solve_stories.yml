    candidate_solvers: [cvxpy, jaxopt]
    visual_trace_id: qp_portfolio_trace
    pseudo_code: ["損失関数を置く", "L1/L2 penalty を足す", "lambda を変えて解く", "係数の疎性と誤差を比較する"]
    interpretation: 正則化は制約または penalty として、過学習と解釈性の tradeoff を作る。
    ai_coding_brief_id: brief_story_convex_regularization
    sources: [convex_optimization]
