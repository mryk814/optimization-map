solve_stories:
  - id: story_lp_production_planning
    title: 生産計画を LP で解く
    case_id: production_planning
    domain: operations
    primary_problem_class: linear_programming
    secondary_problem_classes: [mixed_integer_linear_programming]
    modeling_pattern: resource_allocation
    decision_variables: 製品A/Bの生産量を連続変数にする。
    objective: 利益を最大化する。
    constraints: 材料、設備時間、需要上限、非負制約。
    uncertainty_or_time_structure: まず静的な日次計画として扱う。
    candidate_algorithms: [simplex, interior_point]
    candidate_solvers: [scipy_linprog, highs, pyomo]
    visual_trace_id: lp_production_planning_trace
    pseudo_code: ["変数 x[p] を置く", "資源制約 A x <= b を作る", "利益 c^T x を最大化する", "slack と最適点を読む"]
    interpretation: 最適解は制約の交点に現れ、余っている資源と詰まっている資源が slack で分かる。
    ai_coding_brief_id: brief_story_lp_production_planning
    sources: [linear_programming]
  - id: story_lp_transportation
    title: 輸送問題を LP として読む
    case_id: supply_chain_network
    domain: logistics
    primary_problem_class: linear_programming
    secondary_problem_classes: [combinatorial_optimization]
    modeling_pattern: network_flow
    decision_variables: 拠点 i から需要地 j へ送る量 x[i,j]。
    objective: 輸送コストを最小化する。
    constraints: 供給上限、需要充足、非負制約。
    uncertainty_or_time_structure: 単一期間の静的ネットワーク。
    candidate_algorithms: [simplex, interior_point]
    candidate_solvers: [highs, scipy_linprog, pyomo]
    visual_trace_id: lp_production_planning_trace
    pseudo_code: ["供給地と需要地の index を作る", "cost matrix を読む", "行和・列和制約を置く", "輸送表を出力する"]
    interpretation: ネットワーク構造があっても、量だけを動かすなら LP で整理できる。
    ai_coding_brief_id: brief_story_lp_transportation
    sources: [linear_programming]
  - id: story_qp_portfolio
    title: ポートフォリオのリスクと収益を QP で調整する
    case_id: portfolio
    domain: finance
    primary_problem_class: quadratic_programming
    secondary_problem_classes: [convex_optimization, socp_sdp]
    modeling_pattern: risk_tradeoff
    decision_variables: 資産 weight w[i]。
    objective: 分散リスクと期待収益の tradeoff を最小化する。
    constraints: weight 合計、上下限、必要ならセクター制約。
    uncertainty_or_time_structure: 過去データから推定した静的リスク。
    candidate_algorithms: [interior_point, sequential_quadratic_programming]
    candidate_solvers: [cvxpy, mosek, gurobi]
    visual_trace_id: qp_portfolio_trace
    pseudo_code: ["期待収益と共分散を読む", "risk_aversion を決める", "QP を解く", "risk-return 点を比較する"]
    interpretation: risk_aversion を動かすと、同じ制約でも採用する重みが変わる。
    ai_coding_brief_id: brief_story_qp_portfolio
    sources: [quadratic_programming]
  - id: story_convex_regularization
