patterns:
  - id: linearization
    name_ja: 線形化
    summary: 非線形や論理条件を線形制約に置き換え、LP/MILP として扱う。
  - id: convexification
    name_ja: 凸化
    summary: 非凸構造を凸近似または凸包で扱い、安定した解法へ寄せる。
  - id: relaxation
    name_ja: 緩和
    summary: 難しい制約を外すか弱めて下界・上界・候補解を得る。
  - id: decomposition
    name_ja: 分解
    summary: master/subproblem、時間、シナリオ、地域などで問題を分ける。
  - id: surrogate_modeling
    name_ja: サロゲート
    summary: 高価な評価関数を近似モデルで置き換えて探索効率を上げる。
  - id: scenario_modeling
    name_ja: シナリオ化
    summary: 不確実性を代表シナリオに分けて期待値や制約を評価する。
  - id: robust_counterpart_pattern
    name_ja: ロバスト対応
    summary: 不確実集合の全要素で制約を守る deterministic model に変換する。
  - id: receding_horizon
    name_ja: Receding Horizon
    summary: 有限ホライズン問題を繰り返し解き、観測ごとに計画を更新する。
  - id: penalty_softening
    name_ja: ソフト制約化
    summary: hard 制約をペナルティや slack で扱い、違反と目的を比較可能にする。
  - id: predict_then_optimize
    name_ja: Predict-then-Optimize
    summary: 予測モデルの出力を下流の最適化に接続し、意思決定品質で評価する。
  - id: allocation
    name_ja: 配分
    summary: 限られた資源、予算、数量を複数の対象に割り振る。
  - id: portfolio
    name_ja: ポートフォリオ
    summary: 資産や候補の重みを決め、リターン・リスク・制約のトレードオフを扱う。
  - id: continuous_design
    name_ja: 連続設計
    summary: 連続変数を調整し、滑らかな目的関数や制約の下で良い設計を探す。
  - id: facility_location
    name_ja: 施設配置
    summary: 拠点を開くかどうかと需要の割当を同時に決める。
  - id: scheduling
    name_ja: スケジューリング
    summary: 人、機械、作業、時間枠の割当や順序を制約付きで決める。
  - id: experimental_design
    name_ja: 実験条件探索
    summary: 高価な実験やシミュレーションを少ない試行回数で進める。
  - id: online_experiment
    name_ja: オンライン実験
    summary: 観測結果を見ながら施策や配分を逐次的に更新する。
