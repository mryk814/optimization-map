visual_supplements:
  - id: visual_simplex_vertices
    target_type: algorithm
    target_id: simplex
    title: 頂点を渡り歩く単体法
    visual_type: feasible_region_2d
    learning_goal: 線形制約でできる多角形の頂点だけを調べればよい理由を直感でつかむ。
    what_moves: 現在の頂点、目的関数の等値線、次に入る基底変数。
    what_user_should_notice: 最適解は領域の内側を滑るのではなく、角から角へ移る。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [vertices, active_vertex, objective_line, entering_variable]
    pseudo_code:
      - 初期実行可能基底を選ぶ。
      - 改善できる隣接頂点を探す。
      - 目的値が改善する方向へ pivot する。
      - 改善方向がなくなったら止める。
    ai_coding_brief: React + SVG で feasible polygon と頂点列を描き、現在頂点を token accent で強調する。
  - id: visual_interior_point_path
    target_type: algorithm
    target_id: interior_point
    title: 内側を通る central path
    visual_type: interior_point_path
    learning_goal: 内点法が境界ではなく実行可能領域の内側を進むことを理解する。
    what_moves: interior point、barrier の強さ、目的方向へ寄る経路。
    what_user_should_notice: 制約境界をなぞらず、中心寄りの経路から最適点へ近づく。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [feasible_region, path_points, barrier_parameter, objective_value]
    pseudo_code:
      - barrier つき問題を作る。
      - Newton step で内側の点を更新する。
      - barrier を弱めながら目的方向へ進める。
      - KKT 残差が小さくなったら止める。
    ai_coding_brief: SVG で領域内の点列を曲線表示し、barrier parameter を step label に出す。
  - id: visual_branch_and_bound_tree
    target_type: algorithm
    target_id: branch_and_bound
    title: 探索木と枝刈り
    visual_type: search_tree
    learning_goal: 整数性があると候補空間を分割し、bound で枝を捨てることを理解する。
    what_moves: active node、incumbent、lower bound、pruned branch。
    what_user_should_notice: すべてを列挙せず、勝ち目のない枝を早く閉じる。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [node_id, parent_id, bound, incumbent, status, branch_condition]
    pseudo_code:
      - LP relaxation を解く。
      - 整数でない変数で分岐する。
      - bound と incumbent を更新する。
      - 悪い枝や実行不能な枝を prune する。
    ai_coding_brief: node list と edge list から小さな探索木を描き、active/pruned/incumbent を状態色で区別する。
  - id: visual_cutting_planes
    target_type: algorithm
    target_id: cutting_planes
    title: 緩和領域を切る
    visual_type: cutting_plane_sequence
    learning_goal: 連続緩和の解を保ちながら、整数解でない領域を削る感覚をつかむ。
    what_moves: relaxation polygon、追加される cut、現在の LP 解。
    what_user_should_notice: 切るのは実行可能な整数解ではなく、緩和だけが許した余分な領域。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [relaxation_region, cuts, lp_solution, integer_points]
    pseudo_code:
      - LP relaxation を解く。
      - 整数条件を破る解から cut を作る。
      - cut を追加して再最適化する。
      - 整数解または十分な bound で止める。
    ai_coding_brief: polygon の上に cut line を順に重ね、削られる領域を淡い面で表示する。
  - id: visual_branch_cut_combo
    target_type: algorithm
    target_id: branch_cut
    title: 分岐とカットを組み合わせる
    visual_type: search_tree
    learning_goal: branch-and-bound に cut を混ぜると bound が締まり、探索木が小さくなることを理解する。
    what_moves: tree node、node ごとの cut count、incumbent gap。
    what_user_should_notice: 木を深くするだけでなく、各節点の緩和を強くして探索量を減らす。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [node_id, cuts_added, bound, incumbent, status]
    pseudo_code:
      - relaxation を解く。
      - 有効な cut を足す。
      - まだ整数でなければ分岐する。
      - bound/gap で枝を閉じる。
    ai_coding_brief: 探索木ノードに cut badge と gap meter を表示する。
  - id: visual_dynamic_programming_grid
    target_type: algorithm
    target_id: dynamic_programming
    title: 状態価値の伝播
    visual_type: state_transition_grid
    learning_goal: 部分問題の価値が隣接状態へ伝わり、方策が決まる様子を見る。
    what_moves: value table、best action arrow、frontier。
    what_user_should_notice: 先の価値を再利用するため、同じ部分問題を何度も解かない。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [states, actions, value, best_action, iteration]
    pseudo_code:
      - 終端状態の価値を置く。
      - 遷移先の価値から現在状態を更新する。
      - 価値が収束するまで繰り返す。
      - 最大価値の行動を方策にする。
    ai_coding_brief: grid cell の数値と矢印を iteration slider で更新する。
  - id: visual_constraint_propagation_domain
    target_type: algorithm
    target_id: constraint_propagation
    title: 候補値が削られる
    visual_type: assignment_grid
    learning_goal: 探索の前に制約だけで候補値を狭められることを理解する。
    what_moves: 変数ごとの domain、削除された値、確定した割当。
    what_user_should_notice: 解を試す前に、矛盾する候補が静かに消えていく。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [variables, domains, removed_values, fixed_assignments]
    pseudo_code:
      - 各変数の候補値を用意する。
      - 制約を見て不可能な値を削る。
      - domain が 1 つなら値を確定する。
      - 新しい確定値でさらに伝播する。
    ai_coding_brief: 候補値チップを並べ、削除された値を muted 表示にする。
  - id: visual_local_nlp_descent
    target_type: algorithm
    target_id: local_nlp
    title: 局所解へ降りる
    visual_type: descent_trace_2d
    learning_goal: 非線形最適化で初期値と step size が経路と局所解を左右することを理解する。
    what_moves: 等高線上の点、勾配方向、目的値曲線。
    what_user_should_notice: 目的値は下がっても、大域最適とは限らない。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [iterations, x, y, objective, gradient_norm, step_size]
    pseudo_code:
      - 初期点を置く。
      - 勾配または局所近似から方向を決める。
      - line search で step を選ぶ。
      - 収束条件まで更新する。
    ai_coding_brief: contour map と点列を描き、iteration ごとに objective meter を更新する。
  - id: visual_sqp_local_model
    target_type: algorithm
    target_id: sequential_quadratic_programming
    title: 局所二次モデルを解く
    visual_type: local_model_sequence
    learning_goal: SQP が非線形制約問題を局所的な QP に置き換えて進むことを理解する。
    what_moves: 現在点、線形化制約、二次近似、trial step。
    what_user_should_notice: 本物の曲面を毎回丸ごと解くのではなく、近くで扱いやすい問題にする。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [current_point, linearized_constraints, quadratic_model, step]
    pseudo_code:
      - 現在点で目的と制約を近似する。
      - QP subproblem を解く。
      - merit function で step を受け入れる。
      - 近似を更新する。
    ai_coding_brief: 曲線制約と接線、局所 QP の移動矢印を重ねる。
  - id: visual_conic_solver_cone
    target_type: algorithm
    target_id: conic_solvers
    title: 錐の中で解く
    visual_type: cone_region
    learning_goal: SOCP/SDP が cone membership と線形写像で制約を表すことをつかむ。
    what_moves: cone slice、現在点、dual residual。
    what_user_should_notice: 複雑な凸制約を cone への所属としてそろえる。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [cone_type, primal_point, dual_residual, feasibility]
    pseudo_code:
      - 問題を cone standard form に変換する。
      - primal/dual residual を下げる。
      - cone constraint を保ちながら更新する。
      - gap が小さくなったら止める。
    ai_coding_brief: cone の断面と residual meter を描く。
  - id: visual_benders_master_subproblem
    target_type: algorithm
    target_id: benders
    title: master と subproblem の往復
    visual_type: decomposition_flow
    learning_goal: まず大枠を決め、サブ問題の結果で cut を返す分解の流れを見る。
    what_moves: master solution、subproblem result、Benders cut。
    what_user_should_notice: 一度に全部解かず、構造を分けて情報を戻す。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [master_decision, subproblem_status, cuts, iteration]
    pseudo_code:
      - master problem で一次判断を出す。
      - 固定した判断で subproblem を解く。
      - feasibility/optimality cut を master に返す。
      - cut が増えなくなるまで繰り返す。
    ai_coding_brief: 左右の panel 間を矢印でつなぎ、cut が master に追加される動きを見せる。
  - id: visual_column_generation
    target_type: algorithm
    target_id: column_generation
    title: 必要な列だけ増やす
    visual_type: column_generation_table
    learning_goal: 巨大な候補変数を全部並べず、価値のある列だけ追加する発想をつかむ。
    what_moves: restricted master columns、pricing result、new column。
    what_user_should_notice: 変数を先に全列挙しないことがスケールの鍵になる。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [columns, reduced_cost, new_column, objective]
    pseudo_code:
      - 少数の列で master を解く。
      - dual price を pricing problem に渡す。
      - 改善する列を見つける。
      - 列を足して再最適化する。
    ai_coding_brief: table に新しい列が追加され、reduced cost が 0 に近づく様子を見せる。
  - id: visual_robust_counterpart_region
    target_type: algorithm
    target_id: robust_counterpart
    title: 不確実集合を守る領域
    visual_type: robust_region
    learning_goal: 悪い入力範囲すべてに耐える解が、通常解より保守的になることを見る。
    what_moves: uncertainty set、nominal feasible region、robust feasible region。
    what_user_should_notice: 守る範囲を広げるほど、選べる解の領域は狭くなる。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [uncertainty_set, nominal_region, robust_region, protection_level]
    pseudo_code:
      - 不確実パラメータの集合を決める。
      - 全ケースで制約を満たす条件へ変換する。
      - robust counterpart を解く。
      - 保守性と目的値を確認する。
    ai_coding_brief: nominal/robust の領域差を二重 polygon で表示する。
  - id: visual_saa_scenarios
    target_type: algorithm
    target_id: sample_average_approximation
    title: シナリオ平均で近似する
    visual_type: scenario_table
    learning_goal: 確率分布を有限シナリオに置き換えて期待値を扱うことを理解する。
    what_moves: scenario sample、sample average、confidence band。
    what_user_should_notice: シナリオを増やすほど安定するが、問題サイズも大きくなる。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [scenarios, weights, recourse_cost, sample_average]
    pseudo_code:
      - シナリオを生成する。
      - 各シナリオの recourse cost を評価する。
      - 平均目的として master を解く。
      - サンプル外評価で安定性を見る。
    ai_coding_brief: scenario table と平均値の更新を step 表示する。
  - id: visual_bayesian_optimization_trials
    target_type: algorithm
    target_id: bayesian_optimization
    title: trial と best-so-far
    visual_type: trial_history
    learning_goal: 高価な評価で、少ない trial から良い候補を選ぶ逐次性を見る。
    what_moves: trial point、observed objective、best-so-far、exploration marker。
    what_user_should_notice: 良さそうな場所だけでなく、不確実な場所も試す。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [trial, x, objective, best_so_far, note]
    pseudo_code:
      - 初期点を評価する。
      - surrogate と不確実性を更新する。
      - acquisition が高い点を選ぶ。
      - best-so-far を更新する。
    ai_coding_brief: trial table と best-so-far line を同期させ、現在 trial を強調する。
  - id: visual_evolutionary_population
    target_type: algorithm
    target_id: evolutionary_search
    title: population が移動する
    visual_type: population_search
    learning_goal: 複数候補を同時に保ちながら、選択と変異で良い領域へ寄る動きを見る。
    what_moves: population points、elite、mutation cloud。
    what_user_should_notice: 一点の勾配ではなく、候補群の分布が探索を作る。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [generation, individuals, fitness, elite]
    pseudo_code:
      - 初期 population を作る。
      - fitness で候補を評価する。
      - elite を残し、交叉・変異で次世代を作る。
      - 世代を進める。
    ai_coding_brief: scatter points を generation ごとに移動させ、elite を accent 表示する。
  - id: visual_mpc_horizon
    target_type: algorithm
    target_id: mpc
    title: horizon が前へ進む
    visual_type: mpc_horizon
    learning_goal: MPC が毎時点で有限 horizon を解き直し、最初の入力だけ使うことを理解する。
    what_moves: prediction horizon、applied control、new observed state。
    what_user_should_notice: 未来全体を固定するのではなく、観測ごとに計画を更新する。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [time, state, horizon_states, applied_control]
    pseudo_code:
      - 現在状態を観測する。
      - horizon 上の制御列を最適化する。
      - 先頭の制御だけ適用する。
      - 次時点でまた解き直す。
    ai_coding_brief: time axis 上で horizon window が右へスライドする様子を描く。
  - id: visual_policy_gradient_rollout
    target_type: algorithm
    target_id: policy_gradient
    title: rollout から方策を直す
    visual_type: policy_rollout
    learning_goal: 報酬の高い行動列を増やす方向に方策が更新されることを見る。
    what_moves: rollout trajectory、reward marker、policy arrow。
    what_user_should_notice: 1回の最適解ではなく、試行から方策分布を変える。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [episode, trajectory, rewards, policy_update]
    pseudo_code:
      - 方策から行動をサンプルする。
      - rollout の報酬を集める。
      - 高報酬行動の log probability を上げる。
      - 方策を更新する。
    ai_coding_brief: grid world の軌跡と reward dot を episode ごとに切り替える。
  - id: visual_ucb_bandit
    target_type: algorithm
    target_id: upper_confidence_bound
    title: 信頼上限で arm を選ぶ
    visual_type: arm_selection_history
    learning_goal: 平均が高い arm と、まだ不確実な arm の両方を試す理由を見る。
    what_moves: arm confidence interval、selected arm、cumulative regret。
    what_user_should_notice: 期待値だけでなく、不確実性の幅が行動を変える。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [round, arm, mean, upper_bound, reward, regret]
    pseudo_code:
      - 各 arm の平均報酬と試行回数を持つ。
      - confidence bonus を足した上限を計算する。
      - 上限が最大の arm を選ぶ。
      - 観測報酬で推定を更新する。
    ai_coding_brief: arm ごとの bar と信頼区間を描き、選択 arm を太線で示す。
  - id: visual_differentiable_layer_flow
    target_type: algorithm
    target_id: differentiable_layer
    title: solver を学習の中へ入れる
    visual_type: differentiable_layer_flow
    learning_goal: 予測値から最適化解を出し、下流損失を逆向きに戻す流れを理解する。
    what_moves: prediction、optimization layer、decision loss、gradient feedback。
    what_user_should_notice: 予測精度ではなく、意思決定の損失が学習信号になる。
    static_trace_ok: true
    realtime_solve_required: false
    required_fields: [prediction, optimal_decision, decision_loss, gradient_signal]
    pseudo_code:
      - モデルがパラメータを予測する。
      - 予測を使って最適化問題を解く。
      - 解の意思決定損失を計算する。
      - solver layer を通して勾配を戻す。
    ai_coding_brief: prediction -> solver -> decision -> loss -> gradient の flow diagram を描く。
