# Initial solver and library catalog

- id: cvxpy
  name: CVXPY
  kind: modeling_language
  ecosystem: Python
  supported_problem_classes: [convex_optimization, linear_programming, quadratic_programming, conic_optimization, semidefinite_programming]
  url: https://www.cvxpy.org/
  strengths: [educational, mathematical_syntax, convex_modeling]
  caveats: [mostly_convex_world]

- id: jump
  name: JuMP
  kind: modeling_language
  ecosystem: Julia
  supported_problem_classes: [linear_programming, mixed_integer_linear_programming, nonlinear_programming, semidefinite_programming]
  url: https://jump.dev/JuMP.jl/stable/
  strengths: [broad_solver_support, high_performance, research_friendly]
  caveats: [requires_julia]

- id: pyomo
  name: Pyomo
  kind: modeling_framework
  ecosystem: Python
  supported_problem_classes: [linear_programming, mixed_integer_linear_programming, nonlinear_programming, stochastic_programming]
  url: https://www.pyomo.org/
  strengths: [expressive, extensible, python_ecosystem]
  caveats: [steeper_learning_curve]

- id: ampl
  name: AMPL
  kind: modeling_language
  ecosystem: AMPL
  supported_problem_classes: [linear_programming, mixed_integer_linear_programming, nonlinear_programming]
  url: https://ampl.com/
  strengths: [algebraic_modeling, education, solver_integration]
  caveats: [commercial_platform]

- id: gurobi
  name: Gurobi Optimizer
  kind: commercial_solver
  ecosystem: multi_language
  supported_problem_classes: [linear_programming, quadratic_programming, mixed_integer_linear_programming, nonconvex_optimization]
  url: https://docs.gurobi.com/projects/optimizer/en/current/index.html
  strengths: [high_performance_mip, industrial_use]
  caveats: [commercial_license]

- id: cplex
  name: IBM ILOG CPLEX Optimization Studio
  kind: commercial_solver
  ecosystem: multi_language
  supported_problem_classes: [linear_programming, quadratic_programming, mixed_integer_linear_programming, constraint_programming]
  url: https://www.ibm.com/products/ilog-cplex-optimization-studio
  strengths: [mip, cp, enterprise_features]
  caveats: [commercial_license]

- id: ortools
  name: Google OR-Tools
  kind: optimization_library
  ecosystem: multi_language
  supported_problem_classes: [constraint_programming, mixed_integer_linear_programming, combinatorial_optimization, graph_optimization]
  url: https://developers.google.com/optimization
