    choose_source_when: node/edge の流量や経路として表現でき、保存則が中心になる。
    choose_target_when: グラフ以外の選択、順序、集合制約が主役で flow 構造だけでは弱い。
    decision_note: 保存則を使えるなら Network Flow、より一般の離散選択なら Combinatorial Optimization として読む。
