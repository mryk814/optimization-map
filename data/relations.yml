    shared: 連続変数、凸制約、重み付き和で書けるケースがある。
    decision_axes:
      - 解を一つに決める合意済み目的があるか
      - Pareto frontier や重みの比較を利用者に見せる必要があるか
      - 公平性、リスク、コストのような複数指標を guardrail として分けるか
    choose_source_when: 複数目的の優先順位が未確定で、tradeoff を見せながら判断したい。
    choose_target_when: 単一の凸目的と制約へ落ちており、最適解を一つ返せばよい。
    decision_note: 目的間の選択を支援するなら Multi-objective、すでに一つの凸問題として定義済みなら Convex Optimization として扱う。
