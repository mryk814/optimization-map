# Initial relations between problem classes, algorithms, solvers, and concepts

- source: linear_programming
  target: convex_optimization
  relation_type: is_a
  explanation: 線形目的関数と線形制約は凸構造を持つため、LP は凸最適化の一部。

- source: quadratic_programming
