    type: confused_with
    source: network_flow_graph_optimization
    target: combinatorial_optimization
    explanation: Network Flow は組合せ最適化の一部だが、保存則と容量を持つグラフ構造を使える点が重要。
    shared: node/edge、経路、割当、離散構造を扱う。
    decision_axes:
