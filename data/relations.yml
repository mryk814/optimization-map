    choose_source_when: 整数判断と非線形式が同時にあり、線形化だけでは意味が壊れる。
    choose_target_when: 非線形性を線形化または区分線形近似して、MILP として扱える。
    decision_note: 非線形性が意思決定を変えるなら MINLP、線形近似で十分なら MILP として扱う。
