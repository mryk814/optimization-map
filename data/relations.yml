  - { id: r004, type: overlaps_with, source: nonlinear_programming, target: convex_optimization, explanation: NLP のうち凸性を満たす部分は凸最適化になる。 }
  - { id: r005, type: overlaps_with, source: nonlinear_programming, target: nonconvex_optimization, explanation: 一般の NLP は非凸になりうるため局所解の問題が出る。 }
