# Initial algorithm catalog

- id: simplex_method
  name: Simplex Method
  family: linear_programming
  suitable_for: [linear_programming]
  requires: [linear_objective, linear_constraints]
  notes: LP の古典的かつ実務的に重要な解法。

- id: interior_point
  name: Interior-point Method
  family: continuous_convex_optimization
  suitable_for: [linear_programming, quadratic_programming, conic_optimization, semidefinite_programming, convex_optimization]
  requires: [structured_constraints]
  notes: LP, QP, SOCP, SDP などで重要。

- id: projected_gradient
  name: Projected Gradient Method
  family: first_order_methods
  suitable_for: [convex_optimization, nonlinear_programming]
  requires: [gradient_available, projection_available]

- id: proximal_gradient
  name: Proximal Gradient Method
  family: first_order_methods
  suitable_for: [convex_optimization, nonsmooth_optimization]
  requires: [smooth_plus_proximable_structure]

- id: admm
  name: ADMM
  family: decomposition_methods
  suitable_for: [convex_optimization, distributed_optimization]
  requires: [decomposable_structure]

- id: gradient_descent
  name: Gradient Descent
  family: first_order_methods
  suitable_for: [nonlinear_programming, machine_learning_optimization]
  requires: [gradient_available]

- id: newton_method
  name: Newton Method
  family: second_order_methods
  suitable_for: [nonlinear_programming, convex_optimization]
  requires: [hessian_available_or_approximable]

- id: bfgs
  name: BFGS / Quasi-Newton
  family: second_order_methods
  suitable_for: [nonlinear_programming]
  requires: [gradient_available]

- id: sqp
  name: Sequential Quadratic Programming
  family: constrained_nonlinear_optimization
  suitable_for: [nonlinear_programming, optimal_control]
  requires: [smooth_objective, smooth_constraints]

- id: trust_region
  name: Trust-region Method
  family: nonlinear_optimization
  suitable_for: [nonlinear_programming, nonconvex_optimization, black_box_optimization]
  requires: [local_model]

- id: branch_and_bound
  name: Branch-and-Bound
  family: exact_discrete_optimization
  suitable_for: [mixed_integer_linear_programming, combinatorial_optimization, nonconvex_optimization]
  requires: [bounds_or_relaxations]

- id: cutting_planes
  name: Cutting Planes
  family: exact_discrete_optimization
  suitable_for: [mixed_integer_linear_programming, combinatorial_optimization]
  requires: [valid_inequalities]

- id: branch_and_cut
  name: Branch-and-Cut
  family: exact_discrete_optimization
  suitable_for: [mixed_integer_linear_programming]
  requires: [branching, cutting_planes]

- id: dynamic_programming
  name: Dynamic Programming
  family: sequential_decision
  suitable_for: [combinatorial_optimization, optimal_control, reinforcement_learning]
  requires: [optimal_substructure]

- id: benders_decomposition
  name: Benders Decomposition
  family: decomposition_methods
  suitable_for: [stochastic_programming, mixed_integer_linear_programming]
  requires: [decomposable_master_subproblem_structure]

- id: sddp
  name: Stochastic Dual Dynamic Programming
  family: stochastic_programming
  suitable_for: [stochastic_programming]
  requires: [multistage_structure]

- id: sample_average_approximation
  name: Sample Average Approximation
  family: stochastic_programming
  suitable_for: [stochastic_programming]
  requires: [scenario_samples]

- id: robust_counterpart
  name: Robust Counterpart Reformulation
  family: robust_optimization
  suitable_for: [robust_optimization]
  requires: [uncertainty_set]

- id: wasserstein_dro
  name: Wasserstein DRO
  family: distributionally_robust_optimization
  suitable_for: [distributionally_robust_optimization]
  requires: [samples_or_empirical_distribution]

- id: direct_search
