axes:
  - id: linearity
    name_ja: 線形性
    name_en: Linearity
    category: model_structure
    core: true
    description: 目的関数と制約が線形に書けるかを分ける。
    diagnostic_question: 目的関数と制約は足し算と定数倍だけで表せますか。
    ui_widget: segmented
    values:
      - { id: linear, name_ja: 線形, description: LP/MILP/一部のSPへ進みやすい }
      - { id: convex_nonlinear, name_ja: 凸非線形, description: 凸最適化や円錐最適化の候補 }
      - { id: nonlinear, name_ja: 非線形, description: NLP/非凸最適化/制御の候補 }
      - { id: unknown, name_ja: 不明, description: 診断で追加質問する }
  - id: convexity
    name_ja: 凸性
    name_en: Convexity
    category: model_structure
    core: true
    description: 局所解が大域解と一致する構造かを分ける。
    diagnostic_question: feasible set と目的関数に凸性を期待できますか。
    ui_widget: segmented
    values:
      - { id: convex, name_ja: 凸, description: LP/QP/SOCP/SDP/凸NLP }
      - { id: nonconvex, name_ja: 非凸, description: MINLP/NLP/BO/RL など }
      - { id: mixed, name_ja: 部分的, description: 緩和や分解を検討する }
  - id: variable_domain
    name_ja: 変数領域
    name_en: Variable domain
    category: model_structure
    core: true
    description: 連続・整数・カテゴリなど決定変数の値域を表す。
    diagnostic_question: 決定変数に整数、binary、カテゴリ選択はありますか。
    ui_widget: checklist
    values:
      - { id: continuous, name_ja: 連続, description: LP/QP/NLP/制御 }
      - { id: integer, name_ja: 整数, description: IP/MILP/MINLP }
      - { id: binary, name_ja: binary, description: MILP/CP-SAT/SAT }
      - { id: categorical, name_ja: カテゴリ, description: CP-SAT/BO/HPO }
      - { id: permutation, name_ja: 順列, description: 組合せ最適化 }
  - id: constraint_structure
    name_ja: 制約構造
    name_en: Constraint structure
    category: model_structure
    core: true
    description: 制約の表現形式と強さを表す。
    diagnostic_question: 制約は等式/不等式、論理、資源容量、時系列のどれに近いですか。
    ui_widget: checklist
    values:
      - { id: algebraic, name_ja: 代数制約, description: LP/QP/NLP }
      - { id: logical, name_ja: 論理制約, description: SAT/SMT/CP-SAT }
      - { id: resource, name_ja: 資源制約, description: scheduling/MILP/CP }
      - { id: dynamics, name_ja: 動的制約, description: control/MPC/RL }
      - { id: chance, name_ja: 確率制約, description: SP/RO/DRO }
  - id: objective_structure
    name_ja: 目的関数
    name_en: Objective structure
    category: model_structure
    core: true
    description: 単一目的、多目的、制約充足など目的の性質を表す。
    diagnostic_question: 最小化/最大化したい量は明確ですか。
    ui_widget: segmented
    values:
      - { id: scalar, name_ja: 単一目的, description: 多くの数理最適化 }
      - { id: multi_objective, name_ja: 多目的, description: Pareto/重み付け/制約化 }
      - { id: feasibility, name_ja: 充足のみ, description: CSP/SAT/SMT }
      - { id: blackbox_metric, name_ja: 評価値のみ, description: BO/DFO/HPO }
  - id: differentiability
    name_ja: 微分可能性
    name_en: Differentiability
    category: information
    core: true
    description: 勾配を使えるか、または微分可能な計算グラフかを表す。
    diagnostic_question: 勾配や感度を計算できますか。
    ui_widget: segmented
    values:
      - { id: gradient_available, name_ja: 勾配あり, description: NLP/凸最適化/微分可能最適化 }
      - { id: derivative_free, name_ja: 勾配なし, description: DFO/BO/シミュレーション最適化 }
      - { id: noisy_gradient, name_ja: ノイズあり, description: stochastic approximation/RL }
  - id: blackboxness
    name_ja: ブラックボックス性
    name_en: Black-boxness
    category: information
    core: true
    description: モデル式の内部が見えるか、評価結果だけかを分ける。
    diagnostic_question: 式や制約を直接書けますか、それとも実験・シミュレーション結果だけですか。
    ui_widget: segmented
    values:
      - { id: whitebox, name_ja: 式がある, description: 数理最適化へ進める }
      - { id: graybox, name_ja: 一部見える, description: surrogate/分解/感度を検討 }
      - { id: blackbox, name_ja: 評価のみ, description: BO/DFO/HPO }
  - id: evaluation_cost
    name_ja: 評価コスト
    name_en: Evaluation cost
    category: information
    core: true
    description: 1回の評価にかかる時間・費用・リスクを表す。
    diagnostic_question: 1回の試行は安いですか、高いですか。
    ui_widget: segmented
    values:
      - { id: cheap, name_ja: 安い, description: grid/random/local search も候補 }
      - { id: expensive, name_ja: 高い, description: BO/実験計画が候補 }
      - { id: dangerous, name_ja: 危険, description: safety constraints/robustness が重要 }
  - id: uncertainty_representation
    name_ja: 不確実性
    name_en: Uncertainty representation
    category: uncertainty
    core: true
    description: 不確実性を確率分布、集合、データ駆動で表すかを分ける。
    diagnostic_question: 需要や外乱などの不確実性をどう表せますか。
    ui_widget: segmented
    values:
      - { id: none, name_ja: ほぼなし, description: deterministic optimization }
      - { id: scenarios, name_ja: シナリオ/分布, description: stochastic programming }
      - { id: uncertainty_set, name_ja: 不確実集合, description: robust optimization }
      - { id: ambiguity_set, name_ja: 分布集合, description: DRO }
  - id: risk_measure
    name_ja: リスク尺度
    name_en: Risk measure
    category: uncertainty
    core: true
    description: 期待値、最悪値、CVaRなど不確実性下の判断基準を表す。
    diagnostic_question: 平均を良くしたいですか、悪いケースを抑えたいですか。
    ui_widget: segmented
    values:
      - { id: expectation, name_ja: 期待値, description: SP/平均性能 }
      - { id: worst_case, name_ja: 最悪ケース, description: RO }
      - { id: tail_risk, name_ja: tail risk, description: CVaR/DRO }
      - { id: constraint_violation, name_ja: 違反確率, description: chance constraints }
  - id: time_structure
    name_ja: 時間構造
    name_en: Time structure
    category: dynamics
    core: true
    description: 一回限り、時系列、逐次意思決定かを表す。
    diagnostic_question: 意思決定は一回ですか、時間とともに繰り返しますか。
    ui_widget: segmented
    values:
      - { id: static, name_ja: 静的, description: LP/MILP/NLP }
      - { id: finite_horizon, name_ja: 有限ホライズン, description: MPC/DP/SP }
      - { id: sequential, name_ja: 逐次, description: RL/Bandits/online optimization }
      - { id: continuous_time, name_ja: 連続時間, description: optimal control }
  - id: feedback
    name_ja: フィードバック
    name_en: Feedback
    category: dynamics
    core: true
    description: 結果を見て次の行動を更新するかを表す。
    diagnostic_question: 行動後の観測を使って次の行動を変えますか。
    ui_widget: segmented
    values:
      - { id: open_loop, name_ja: open-loop, description: 計画を事前に固定 }
      - { id: receding_horizon, name_ja: receding horizon, description: MPC }
      - { id: online_feedback, name_ja: online feedback, description: online/RL/bandits }
  - id: solution_guarantee
    name_ja: 解保証
    name_en: Solution guarantee
    category: decision
    core: true
    description: 厳密最適性、gap、近似、良さそうな解のどれが必要かを表す。
    diagnostic_question: 最適性証明や gap は必要ですか。
    ui_widget: segmented
    values:
      - { id: exact, name_ja: 厳密, description: LP/MIP/CP-SAT }
      - { id: gap_bound, name_ja: gap, description: MIP/branch-and-bound }
      - { id: approximate, name_ja: 近似, description: heuristic/metaheuristic/BO }
      - { id: policy_quality, name_ja: 方策品質, description: RL/Control }
  - id: scale
    name_ja: 規模
    name_en: Scale
    category: decision
    core: false
    description: 変数数、制約数、シナリオ数、評価回数の大きさ。
    diagnostic_question: 変数・制約・ケース数はどの程度ですか。
    ui_widget: segmented
    values:
      - { id: small, name_ja: 小, description: exact/modeling-first }
      - { id: medium, name_ja: 中, description: standard solvers }
      - { id: large, name_ja: 大, description: decomposition/heuristics }
  - id: data_availability
    name_ja: データ量
    name_en: Data availability
    category: information
    core: false
    description: 過去データやシミュレーションデータが利用できるか。
    diagnostic_question: 学習や推定に使える履歴データはありますか。
    ui_widget: segmented
    values:
      - { id: none, name_ja: なし, description: model-based }
      - { id: sparse, name_ja: 少量, description: BO/robustness }
      - { id: rich, name_ja: 十分, description: predict-then-optimize/RL }
  - id: stochasticity_source
    name_ja: 確率性の源
    name_en: Stochasticity source
    category: uncertainty
    core: false
    description: 需要、外乱、評価ノイズ、環境遷移など確率性の出所。
    diagnostic_question: 何がランダムに変わりますか。
    ui_widget: checklist
    values:
      - { id: demand, name_ja: 需要, description: inventory/SP }
      - { id: disturbance, name_ja: 外乱, description: control/RO }
      - { id: measurement_noise, name_ja: 測定ノイズ, description: BO/simulation }
      - { id: transition, name_ja: 状態遷移, description: RL/MDP }
  - id: explainability_need
    name_ja: 説明責任
    name_en: Explainability need
    category: decision
    core: false
    description: なぜその解になったかを説明する必要度。
    diagnostic_question: 判断理由を人に説明する必要がありますか。
    ui_widget: segmented
    values:
      - { id: low, name_ja: 低, description: black-box heuristics も許容 }
      - { id: medium, name_ja: 中, description: sensitivity/reason codes }
      - { id: high, name_ja: 高, description: exact model/duals/gap }
  - id: feasibility_strictness
    name_ja: 制約違反許容
    name_en: Feasibility strictness
    category: decision
    core: false
    description: 制約違反が許されるか、ペナルティ化できるかを表す。
    diagnostic_question: 制約違反は絶対禁止ですか。
    ui_widget: segmented
    values:
      - { id: hard, name_ja: hard, description: CP/MIP/安全制約 }
      - { id: soft, name_ja: soft, description: penalty/goal programming }
      - { id: tradeoff, name_ja: tradeoff, description: multi-objective }
  - id: solver_runtime
    name_ja: 実行時間
    name_en: Runtime budget
    category: decision
    core: false
    description: 秒、分、時間、オフラインなど許容計算時間。
    diagnostic_question: 解を出すまでに使える時間はどれくらいですか。
    ui_widget: segmented
    values:
      - { id: realtime, name_ja: リアルタイム, description: MPC/heuristic }
      - { id: interactive, name_ja: 対話的, description: 秒〜分 }
      - { id: batch, name_ja: バッチ, description: 分〜時間 }
      - { id: offline, name_ja: オフライン, description: 学習/設計 }
  - id: model_confidence
    name_ja: モデル信頼度
    name_en: Model confidence
    category: information
    core: false
    description: モデル式が現実をどれだけ表すかへの自信。
    diagnostic_question: モデル式は信頼できますか。
    ui_widget: segmented
    values:
      - { id: high, name_ja: 高, description: deterministic/model-based }
      - { id: medium, name_ja: 中, description: robust/sensitivity }
      - { id: low, name_ja: 低, description: data-driven/experiment }
  - id: interaction_mode
    name_ja: 実験方式
    name_en: Interaction mode
    category: information
    core: false
    description: オフライン解析、実験、シミュレーション、オンライン運用の違い。
    diagnostic_question: 解候補はどこで評価しますか。
    ui_widget: segmented
    values:
      - { id: offline_model, name_ja: モデル内, description: solver }
      - { id: simulator, name_ja: シミュレーション, description: simulation optimization }
      - { id: physical_experiment, name_ja: 実験, description: BO/safe optimization }
      - { id: live_system, name_ja: 本番, description: bandits/online }
  - id: decomposition_potential
    name_ja: 分解可能性
    name_en: Decomposition potential
    category: model_structure
    core: false
    description: サブ問題に分けられる構造があるか。
    diagnostic_question: 時間、地域、商品などで分割できますか。
    ui_widget: segmented
    values:
      - { id: separable, name_ja: 分離可能, description: decomposition/ADMM/Benders }
      - { id: weakly_coupled, name_ja: 弱結合, description: decomposition candidate }
      - { id: tightly_coupled, name_ja: 強結合, description: monolithic/relaxation }
  - id: discreteness_source
    name_ja: 離散性の源
    name_en: Discreteness source
    category: model_structure
    core: false
    description: on/off、割当、順序、論理など離散性の理由。
    diagnostic_question: 離散判断は何から来ていますか。
    ui_widget: checklist
    values:
      - { id: selection, name_ja: 選択, description: facility/location/knapsack }
      - { id: assignment, name_ja: 割当, description: matching/scheduling }
      - { id: ordering, name_ja: 順序, description: routing/sequencing }
      - { id: logic, name_ja: 論理, description: SAT/CP-SAT }
  - id: state_dimension
    name_ja: 状態次元
    name_en: State dimension
    category: dynamics
    core: false
    description: 制御/RL/DPで扱う状態の大きさ。
    diagnostic_question: 状態は少数の変数で表せますか。
    ui_widget: segmented
    values:
      - { id: low, name_ja: 低次元, description: DP/MPC }
      - { id: high, name_ja: 高次元, description: approximate DP/RL }
      - { id: partial, name_ja: 部分観測, description: POMDP/filtering }
  - id: deployment_stage
    name_ja: 利用段階
    name_en: Deployment stage
    category: decision
    core: false
    description: 教材、設計、運用、監査など利用目的。
    diagnostic_question: 今ほしいのは理解、設計、運用、監査のどれですか。
    ui_widget: segmented
    values:
      - { id: learning, name_ja: 学習, description: comparison/explanation }
      - { id: modeling, name_ja: モデリング, description: formulation support }
      - { id: operations, name_ja: 運用, description: solver/pipeline }
      - { id: audit, name_ja: 監査, description: explanation/sources }
